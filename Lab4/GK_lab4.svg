<?xml version="1.0"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN"
"http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg version="1.1" xmlns="http://www.w3.org/2000/svg"
xmlns:xlink="http://www.w3.org/1999/xlink"
width="4in" height="4in"
viewBox="0 0 400 400"
preserveAspectRatio="xMidYMid">

<rect x="0" y="0" width="100%" height="100%" fill="none" stroke="black" stroke-width="2" />

<defs>

   <g id ="wheel" style = "stroke:black">
            <polygon points="30,0 24,18 9,28 -9,28 -24,18 -30,0 -24,-18 -9,-28 9,-28 24,-18 " 
                style="fill:none;stroke:black;"/>
            <line x1="30" y1="0"  />
            <line x1="24" y1="18"  />
            <line x1="9" y1="28"  />
            <line x1="-9" y1="28"  />
            <line x1="-24" y1="18" />
            <line x1="-30" y1="0"  />
            <line x1="-24" y1="-18"  />
            <line x1="-9" y1="-28"  />
            <line x1="9" y1="-28"  />
            <line x1="24" y1="-18"  />   
            <animateTransform 
                attributeName="transform" 
                attributeType="XML" 
                type="rotate" 
                from="0 " 
                to="360 " 
                dur="5s" 
                repeatCount="indefinite" />
        </g>

  <g id="triangle">
    <polygon points="0,0 20,100 -20,100"/>
  </g>

  <g id="mechanism">

    <g transform="rotate(15)">
      <line x1="-60" y1="0" x2="60" y2="0"
            stroke="red" stroke-width="8"/>

      <g transform="translate(-60,0)">
        <use xlink:href="#wheel"/>
      </g>

      <g transform="translate(60,0)">
        <use xlink:href="#wheel"/>
      </g>

    </g>

  </g>

</defs>
  <g transform="translate(120,120) scale(0.8)">
    <use xlink:href="#mechanism"/>
    <use xlink:href="#triangle" fill="purple"/>
  </g>


  <g transform="translate(200,300) scale(1.0)">
    <use xlink:href="#mechanism"/>
    <use xlink:href="#triangle" fill="blue"/>
  </g>


  <g transform="translate(320,150) scale(0.6)">
    <use xlink:href="#mechanism"/>
    <use xlink:href="#triangle" fill="green"/>
  </g>

</svg>
