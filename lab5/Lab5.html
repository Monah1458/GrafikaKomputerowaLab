<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Modified Unlit Cube Example</title>
    <script src="glsim.js"></script> <!-- load the OpenGL 1.1 simulation code -->
    <script>

        let rotateX = 15; // rotations of cube about the axes
        let rotateY = -15;
        let rotateZ = 0;
        var objectNumber = 1;

        function square(r, g, b) {
            glColor3f(r, g, b);
            glBegin(GL_TRIANGLE_FAN);
            glVertex3f(-0.5, -0.5, 0.5);
            glVertex3f(0.5, -0.5, 0.5);
            glVertex3f(0.5, 0.5, 0.5);  
            glVertex3f(-0.5, 0.5, 0.5);
            glEnd();
        }

    function cube(size) {  // draws a cube with side length = size
    
        glPushMatrix();
        glScalef(size,size,size); // scale unit cube to desired size
        
        square(1, 0, 0); // red front face
        
        glPushMatrix();
        glRotatef(90, 0, 1, 0);
        square(0, 1, 0); // green right face
        glPopMatrix();
        
        glPushMatrix();
        glRotatef(-90, 1, 0, 0);
        square(0, 0, 1); // blue top face
        glPopMatrix();
        
        glPushMatrix();
        glRotatef(180, 0, 1, 0);
        square(0, 1, 1); // cyan back face
        glPopMatrix();
        
        glPushMatrix();
        glRotatef(-90, 0, 1, 0);
        square(1, 0, 1); // magenta left face
        glPopMatrix();
        
        glPushMatrix();
        glRotatef(90, 1, 0, 0);
        square(1, 1, 0); // yellow bottom face
        glPopMatrix();
        
        glPopMatrix(); // Restore matrix to its state before cube() was called.

    }

        function Poly(r, g, b, n, rad) {
            glColor3f(r, g, b);
            glBegin(GL_TRIANGLE_FAN);
            var degree = 0;
            var move = Math.PI * 2 / n;
            for (let i = 0; i < n; i++) {
                var x = rad * Math.cos(degree);
                var y = rad * Math.sin(degree);
                degree += move;
                glVertex3f(x, y, 0);
            }
            glEnd();
        }

        function Triangle(r, g, b, Points) {
            glColor3f(r, g, b);
            glBegin(GL_TRIANGLE_FAN);
            glVertex3f(Points[0][0], Points[0][1], Points[0][2]);
            glVertex3f(Points[1][0], Points[1][1], Points[1][2]);
            glVertex3f(Points[2][0], Points[2][1], Points[2][2]);
            glEnd();
        }

        function Triangle1Side(r, g, b, n, rad, h) {
            var degree = 0;
            var move = Math.PI * 2 / n;

            for (let i = 0; i < n; i++) {
                var x = rad * Math.cos(degree);
                var y = rad * Math.sin(degree);
                const Points = [[x, y, 0]];
                degree += move;
                x = rad * Math.cos(degree);
                y = rad * Math.sin(degree);
                Points.push([x, y, 0]);
                Points.push([0, 0, h]);
                Triangle(r + i / n, g + i /  n, b + i / n, Points);
            }
        }

        function Pyramida(scale, n, rad, h) {
            glPushMatrix();
            glScalef(scale, scale, scale);
            Poly(0.3, 0.119, 0.252, n, rad);
            glPushMatrix();
            Triangle1Side(0.3, 0.119, 0.252, n, rad, h);
            glPopMatrix();  
            glPopMatrix();
        }

        function Korkociag(scale, n, rad, h) {
            glPushMatrix();
            glScalef(scale, scale, scale);

            glColor3f(0.3, 0.119, 0.252);
            glBegin(GL_LINE_STRIP);

            const steps = 360 * n;

            for (let i = 0; i <= steps; i++) {
                const t = i / steps;              // 0 → 1
                const angle = t * 2 * Math.PI * n;
                const radius = t * rad;

                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                const z = t * h;

                glVertex3f(x, y, z);
            }

            glEnd();
            glPopMatrix();
        }

        function display() {

            glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);

            glLoadIdentity();
            glRotatef(rotateZ, 0, 0, 1);
            glRotatef(rotateY, 0, 1, 0);
            glRotatef(rotateX, 1, 0, 0);
            switch (objectNumber) {
                case 1:
                    Korkociag(1, 20, 0.5, 0.8);
                    break;
                case 2:
                    Pyramida(1, 10, 0.3, 1);
                    break;
                default:
                    break;
            }

        }

        function initGL() {
            glMatrixMode(GL_PROJECTION);
            glOrtho(-1, 1, -1, 1, -1, 1);
            glMatrixMode(GL_MODELVIEW);
            glEnable(GL_DEPTH_TEST);
            glClearColor(0, 0, 0, 1);
        }

        function doKeyDown(evt) {
            let key = evt.keyCode;
            if (key == 37) // left
                rotateY -= 15;
            else if (key == 39) // right
                rotateY += 15;
            else if (key == 40) // down
                rotateX += 15;
            else if (key == 38) // up
                rotateX -= 15;
            else if (key == 33) // page up
                rotateZ += 15;
            else if (key == 34) // page down
                rotateZ -= 15;
            else if (key == 36) // home
                rotateX = rotateY = rotateZ = 0;
            if (key >= 34 && key <= 40) {
                evt.preventDefault();
            }
            if (key == 49)
                objectNumber = 1
            else if (key == 50)
                objectNumber = 2
            display();
        }

        function init() {
            try {
                glsimUse("glcanvas"); // OpenGL will draw to the canvas with id="glcanvas".
            } catch (e) {
                document.getElementById("canvas-holder").innerHTML =
                    "Sorry, an error occured:<br>" + e;
                return;
            }
            document.onkeydown = doKeyDown;
            initGL();
            display();
        }

    </script>
</head>

<body onload="init()">

    <h3>A Modified Unlit Cube in OpenGL 1.1</h3>

    <p>Rotate using arrow keys, page up, page down, and home keys.</p>

    <noscript>
        <p><b>Sorry, this page requires JavaScript!</b></p>
    </noscript>

    <div id="canvas-holder">
        <canvas id="glcanvas" width="500" height="500"></canvas>
    </div>

</body>

</html>
